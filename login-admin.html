<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-visual" style="background:linear-gradient(135deg,#0a1f44,#123a8a)">
    <a href="index.html" class="brand" style="text-decoration:none">
      <div class="brand-badge"><img src="assets/naic-engineering-logo.png" alt="Naic Engineering Office seal"></div>
      <div class="brand-text"><small>Admin Panel</small><strong>Municipality of Naic</strong></div>
    </a>
    <h2>Oversee every intern, <span>every hour.</span></h2>
    <div class="quote">Manage OJT batches, verify records, and export reports in one place.</div>
  </aside>
  <section class="auth-form">
    <div class="auth-form-inner">
      <h1>Admin Login</h1>
      <p class="sub">Restricted access. Sign in with your administrator email.</p>
      <form id="loginForm">
        <div class="form-group"><label>Email</label>
          <input type="text" class="form-control" id="u" required autofocus placeholder="admin@naic.gov.ph"></div>
        <div class="form-group"><label>Password</label>
          <input type="password" class="form-control" id="p" required placeholder="••••••••"></div>
        <div class="form-error" id="err"></div>
        <button class="btn btn-primary btn-block" id="btn" type="submit">Sign In</button>
      </form>
      <div class="auth-switch"><a href="index.html"> Back to Home</a></div>
    </div>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/data.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('btn'); btn.disabled = true; btn.textContent = 'Signing in…';
  const err = document.getElementById('err'); err.classList.remove('show');
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const r = await loginAdmin(u, p);
  if(!r.ok){ err.textContent = r.error; err.classList.add('show'); btn.disabled=false; btn.textContent='Sign In'; return; }
  window.location.href = 'admin/dashboard.html';
});
</script>
</body>
</html>
