<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Intern Login — Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-visual">
    <a href="index.html" class="brand" style="text-decoration:none">
      <div class="brand-badge"><img src="assets/naic-engineering-logo.png" alt="Naic Engineering Office seal"></div>
      <div class="brand-text"><small>Attendance System</small><strong>Municipality of Naic</strong></div>
    </a>
    <h2>Log your OJT hours <span>the smart way.</span></h2>
    <div class="quote">"Public service starts with punctuality."</div>
  </aside>
  <section class="auth-form">
    <div class="auth-form-inner">
      <h1>Intern Login</h1>
      <p class="sub">Welcome back! Sign in to time in, track hours, and view your reports.</p>
      <div class="form-success" id="ok"></div>
      <form id="loginForm">
        <div class="form-group"><label>Username or Email</label>
          <input type="text" class="form-control" id="u" required autofocus placeholder="username or email"></div>
        <div class="form-group"><label>Password</label>
          <input type="password" class="form-control" id="p" required placeholder="••••••••"></div>
        <div class="form-error" id="err"></div>
        <button class="btn btn-primary btn-block" id="btn" type="submit">Sign In</button>
      </form>
      <div class="auth-switch"><a href="forgot-password.html">Forgot password?</a></div>
      <div class="auth-switch">New intern? <a href="signup-student.html">Create an account</a></div>
      <div class="auth-switch"><a href="index.html"> Back to Home</a></div>
    </div>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/data.js"></script>
<script>
const qs = new URLSearchParams(window.location.search);
const okBox = document.getElementById('ok');
if(qs.get('verified') === '1'){
  okBox.textContent = 'Email verified. You can now sign in.';
  okBox.classList.add('show');
}
if(qs.get('reset') === '1'){
  okBox.textContent = 'Password updated. Please sign in with your new password.';
  okBox.classList.add('show');
}
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('btn'); btn.disabled=true; btn.textContent='Signing in…';
  const err = document.getElementById('err'); err.classList.remove('show');
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const r = await loginStudent(u, p);
  if(!r.ok){ err.textContent=r.error; err.classList.add('show'); btn.disabled=false; btn.textContent='Sign In'; return; }
  window.location.href = 'student/dashboard.html';
});
</script>
</body>
</html>
