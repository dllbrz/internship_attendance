<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Intern · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(async()=>{
const user = await requireStudent();
if(user){
  const done = totalHours(user.id);
  const req = user.required_hours;
  const remaining = 0;
  const pct = Math.min(100, (done/req)*100).toFixed(1);
  const today = getTodayAttendance(user.id);
  const recent = studentAttendance(user.id).slice(0,5);

  document.getElementById('shell').innerHTML = renderSidebar('student','dashboard') + `
    <main class="main">
      ${renderTopbar('Welcome, '+user.name.split(' ')[0]+'!','Here is your OJT snapshot for today.')}
      <div class="stat-grid">
        <div class="stat-card"><div><div class="stat-label">Today's Status</div>
          <div class="stat-value">${today?today.status.toUpperCase():'NOT IN'}</div>
          <div class="stat-meta">Status for ${fmtDate(todayStr())}</div></div>
          <div class="stat-icon"></div></div>
        <div class="stat-card green"><div><div class="stat-label">Completed Hours</div>
          <div class="stat-value">${done}</div><div class="stat-meta">of ${req} required</div></div><div class="stat-icon"></div></div>
        <div class="stat-card yellow"><div><div class="stat-label">Remaining Hours</div>
          <div class="stat-value">${remaining.toFixed(2)}</div><div class="stat-meta">${(req-remaining>0?Math.ceil(remaining/8):0)} working days left</div></div><div class="stat-icon">⏳</div></div>
        <div class="stat-card"><div><div class="stat-label">Progress</div>
          <div class="stat-value">${pct}%</div><div class="stat-meta">Overall completion</div></div><div class="stat-icon"></div></div>
      </div>

      <div class="card-grid-2">
        <div class="card">
          <div class="card-head"><div><div class="card-title">OJT Progress</div><div class="card-subtitle">Toward your required ${req} hours</div></div></div>
          <div class="ring-progress" style="--pct:${pct}"><div class="ring-inner"><strong>${pct}%</strong><small>Completed</small></div></div>
          <div class="progress-label mt-4"><span>${done} hrs done</span><strong>${remaining.toFixed(2)} hrs to go</strong></div>
          <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        </div>
        <div class="card">
          <div class="card-head"><div><div class="card-title">Your Unique QR Code</div><div class="card-subtitle">Show this to the scanner for quick time in/out.</div></div></div>
          <div class="qr-display"><div id="qr" style="display:inline-block"></div>
            <div style="font-weight:700;color:var(--blue-800)">${user.id}</div>
            <div class="text-muted text-sm">${user.name}</div>
            <div style="margin-top:10px">
              <button class="btn btn-primary btn-sm" onclick="downloadQR('${user.id}')">Download QR Code</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><div class="card-title">Recent Attendance</div>
          <a href="attendance.html" class="btn btn-ghost btn-sm">See all </a></div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Time In</th><th>Time Out</th><th>Hours</th><th>Status</th></tr></thead>
          <tbody>${recent.length?recent.map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${fmt12(r.time_in)}</td><td>${fmt12(r.time_out)}</td><td>${r.hours||'—'}</td>
          <td><span class="pill ${r.status==='present'?'green':r.status==='late'?'yellow':'red'}">${r.status}</span></td></tr>`).join(''):'<tr><td colspan="5" class="text-center text-muted" style="padding:24px">No records yet.</td></tr>'}</tbody></table></div>
      </div>
    </main>`;

  startClock('#clockBox');
  try{ new QRCode(document.getElementById('qr'), {text:(user.qr_token||user.id), width:200, height:200, colorDark:'#0a1f44', colorLight:'#ffffff'}); }catch(e){console.warn(e);}
}
})();

function downloadQR(filename){
  const holder = document.getElementById('qr');
  if(!holder){ alert('QR not ready yet.'); return; }
  const canvas = holder.querySelector('canvas');
  const img = holder.querySelector('img');
  let dataUrl = null;
  if(canvas){ dataUrl = canvas.toDataURL('image/png'); }
  else if(img){ dataUrl = img.src; }
  if(!dataUrl){ alert('QR not ready yet.'); return; }
  const a = document.createElement('a');
  a.href = dataUrl; a.download = (filename||'qr-code')+'.png';
  document.body.appendChild(a); a.click(); a.remove();
}
</script>
</body></html>
