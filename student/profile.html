<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile — Intern · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
<script>
async function render(){
  const u = await requireStudent(); if(!u) return;
  document.getElementById('shell').innerHTML = renderSidebar('student','profile') + `
    <main class="main">
      ${renderTopbar('My Profile','View and edit your personal information, adviser, and requirements.')}
      <div class="card-grid-2">
        <div class="card text-center">
          <div class="avatar" style="width:140px;height:140px;font-size:42px;margin:0 auto 12px;overflow:hidden;border-radius:50%">
            ${u.avatar ? `<img src="${u.avatar}" alt="Profile picture" style="width:100%;height:100%;object-fit:cover">` : (u.name||'U').split(' ').map(x=>x[0]).slice(0,2).join('').toUpperCase()}
          </div>
          <h3 style="color:var(--blue-900)">${u.name}</h3>
          <div class="text-muted text-sm">${u.id} · ${u.course||''}</div>
          <div class="mt-4">
            <input type="file" id="pic" accept="image/*" style="display:none" onchange="uploadPic(event)">
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('pic').click()">Change Photo</button>
          </div>
          <hr style="margin:20px 0;border:none;border-top:1px solid var(--gray-200)">
          <div style="text-align:left">
            <div class="text-muted text-sm">Required Hours</div><div style="font-weight:700;color:var(--blue-800)">${u.required_hours} hrs</div>
            <div class="text-muted text-sm mt-2">OJT Period</div><div style="font-weight:600">${fmtDate(u.start_date)} – ${fmtDate(u.end_date)}</div>
            <div class="text-muted text-sm mt-2">School</div><div style="font-weight:600">${u.school||'—'}</div>
            <div class="text-muted text-sm mt-2">OJT Adviser</div><div style="font-weight:600">${u.adviser_name||'—'}</div>
            <div class="text-muted text-sm">Adviser Contact</div><div style="font-weight:600">${u.adviser_contact||'—'}</div>
          </div>
          <hr style="margin:20px 0;border:none;border-top:1px solid var(--gray-200)">
          <div class="qr-display">
            <div class="card-title" style="margin-bottom:8px">My QR Code</div>
            <div id="qr" style="display:inline-block"></div>
            <div style="font-weight:700;color:var(--blue-800);margin-top:6px">${u.id}</div>
            <div style="margin-top:10px">
              <button class="btn btn-primary btn-sm" onclick="downloadQR('${u.id}')">Download QR Code</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Personal Information</div>
          <div class="text-muted text-sm">Email</div><div style="font-weight:600">${u.email||'—'}</div>
          <div class="text-muted text-sm mt-2">Phone</div><div style="font-weight:600">${u.phone||'—'}</div>
          <div class="text-muted text-sm mt-2">Address</div><div style="font-weight:600">${u.address||'—'}</div>

          <hr style="margin:18px 0;border:none;border-top:1px solid var(--gray-200)">
          <div class="card-title">Progress</div>
          <div style="font-size:14px;color:var(--gray-700);margin-bottom:6px">
            ${totalHours(u.id)} / ${u.required_hours} hours rendered
          </div>
          <div style="height:10px;background:#eef2f7;border-radius:6px;overflow:hidden">
            <div style="height:100%;background:linear-gradient(90deg,#0d2b6b,#123a8a);width:${Math.min(100,(totalHours(u.id)/u.required_hours*100)).toFixed(1)}%"></div>
          </div>
        </div>
      </div>
    </main>`;
  startClock('#clockBox');
  new QRCode(document.getElementById('qr'), { text:u.qr_token, width:160, height:160, colorDark:'#0d2b6b', colorLight:'#fff' });
}
function downloadQR(filename){
  const holder = document.getElementById('qr');
  if(!holder){ toast('QR not ready yet.','error'); return; }
  const canvas = holder.querySelector('canvas');
  const img = holder.querySelector('img');
  let dataUrl = null;
  if(canvas){ dataUrl = canvas.toDataURL('image/png'); }
  else if(img){ dataUrl = img.src; }
  if(!dataUrl){ toast('QR not ready yet.','error'); return; }
  const a = document.createElement('a');
  a.href = dataUrl; a.download = (filename||'qr-code')+'.png';
  document.body.appendChild(a); a.click(); a.remove();
  toast('QR code downloaded.','success');
}
async function uploadPic(e){
  const f = e.target.files[0]; if(!f) return;
  toast('Uploading…','info');
  const r = await uploadAvatar(f);
  if(!r.ok){ toast(r.error,'error'); return; }
  toast('Photo updated.','success');
  render();
}
render();
</script>
</body>
</html>
