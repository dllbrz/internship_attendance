<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reports — Intern · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script>
async function render(){
  const u = await requireStudent(); if(!u) return;
  const list = studentAttendance(u.id);
  const total = totalHours(u.id);
  const pct = Math.min(100,(total/u.required_hours)*100).toFixed(1);
  const late = list.filter(a=>a.status==='late').length;
  const present = list.filter(a=>a.status==='present').length;

  document.getElementById('shell').innerHTML = renderSidebar('student','reports') + `
    <main class="main">
      ${renderTopbar('My Reports','Personal attendance summary and downloads.')}
      <div class="stat-grid">
        <div class="stat-card green"><div><div class="stat-label">Hours Rendered</div><div class="stat-value">${total}</div><div class="stat-meta">of ${u.required_hours} required (${pct}%)</div></div><div class="stat-icon"></div></div>
        <div class="stat-card"><div><div class="stat-label">Present Days</div><div class="stat-value">${present}</div></div><div class="stat-icon"></div></div>
        <div class="stat-card yellow"><div><div class="stat-label">Late Days</div><div class="stat-value">${late}</div></div><div class="stat-icon">️</div></div>
        <div class="stat-card"><div><div class="stat-label">Total Records</div><div class="stat-value">${list.length}</div></div><div class="stat-icon"></div></div>
      </div>

      <div class="card">
        <div class="card-head"><div class="card-title">Hours Per Day (Last 14 days)</div></div>
        <canvas id="chart" height="90"></canvas>
      </div>

      <div class="card">
        <div class="card-head"><div class="card-title">Full Attendance Report</div>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="csv()"> CSV</button>
            <button class="btn btn-primary btn-sm" onclick="pdf()"> PDF</button>
            <button class="btn btn-yellow btn-sm" onclick="prn()"> Print</button>
          </div></div>
        <div class="table-wrap"><table id="tbl"><thead><tr><th>Date</th><th>Time In</th><th>Time Out</th><th>Hours</th><th>Status</th></tr></thead>
        <tbody>${list.map(r=>`<tr><td>${fmtDate(r.date)}</td><td>${fmt12(r.time_in)}</td><td>${fmt12(r.time_out)}</td><td>${r.hours||'—'}</td>
        <td><span class="pill ${r.status==='present'?'green':r.status==='late'?'yellow':'red'}">${r.status}</span></td></tr>`).join('')}</tbody></table></div>
      </div>
    </main>`;

  startClock('#clockBox');
  const last14 = list.slice(0,14).reverse();
  new Chart(document.getElementById('chart'),{type:'bar',data:{labels:last14.map(r=>r.date.slice(5)),
    datasets:[{label:'Hours',data:last14.map(r=>r.hours||0),backgroundColor:'#123a8a',borderRadius:6}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:10}}}});
}
async function csv(){ const u=await requireStudent(); const rows=[['Date','Time In','Time Out','Hours','Status']]; studentAttendance(u.id).forEach(r=>rows.push([fmtDate(r.date),fmt12(r.time_in),fmt12(r.time_out),r.hours||0,r.status])); exportCSV('report-'+u.id+'.csv',rows);}
async function pdf(){ const u=await requireStudent(); const rows=studentAttendance(u.id).map(r=>[fmtDate(r.date),fmt12(r.time_in),fmt12(r.time_out),r.hours||'—',r.status.toUpperCase()]); exportPDF('report-'+u.id+'.pdf','Personal Attendance Report — '+u.name,['Date','Time In','Time Out','Hours','Status'],rows);}
async function prn(){ printReport('Attendance Report — '+(await requireStudent()).name, document.getElementById('tbl').outerHTML);}
render();
</script>
</body></html>
