<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-visual">
    <a href="index.html" class="brand" style="text-decoration:none">
      <div class="brand-badge"><img src="assets/naic-engineering-logo.png" alt="Naic Engineering Office seal"></div>
      <div class="brand-text"><small>Secure Reset</small><strong>Municipality of Naic</strong></div>
    </a>
    <h2>Create a new password <span>securely.</span></h2>
    <div class="quote">Enter the email OTP from Supabase, then set your new intern password.</div>
  </aside>
  <section class="auth-form">
    <div class="auth-form-inner">
      <h1>Reset Password</h1>
      <p class="sub">Use the reset code sent to your intern email.</p>
      <form id="resetForm">
        <div class="form-group"><label>Email</label><input class="form-control" type="email" id="email" required autofocus></div>
        <div class="form-group"><label>Reset code / OTP</label><input class="form-control otp-input" id="otp" inputmode="numeric" autocomplete="one-time-code" required placeholder="6-digit code"></div>
        <div class="form-row">
          <div class="form-group"><label>New Password</label><input class="form-control" type="password" id="p1" required minlength="6"></div>
          <div class="form-group"><label>Confirm Password</label><input class="form-control" type="password" id="p2" required minlength="6"></div>
        </div>
        <div class="form-error" id="err"></div>
        <button class="btn btn-primary btn-block" type="submit" id="btn">Reset Password</button>
      </form>
      <div class="auth-switch"><a href="forgot-password.html">Request a new code</a></div>
      <div class="auth-switch"><a href="login-student.html">Back to Intern Login</a></div>
    </div>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/data.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('email').value = params.get('email') || '';
document.getElementById('resetForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='Resetting…';
  const err=document.getElementById('err'); err.classList.remove('show');
  const p1=document.getElementById('p1').value;
  const p2=document.getElementById('p2').value;
  if(p1 !== p2){ err.textContent='Passwords do not match.'; err.classList.add('show'); btn.disabled=false; btn.textContent='Reset Password'; return; }
  const verify = await verifyPasswordResetOtp(document.getElementById('email').value, document.getElementById('otp').value);
  if(!verify.ok){ err.textContent=verify.error; err.classList.add('show'); btn.disabled=false; btn.textContent='Reset Password'; return; }
  const update = await updateCurrentPassword(p1);
  if(!update.ok){ err.textContent=update.error; err.classList.add('show'); btn.disabled=false; btn.textContent='Reset Password'; return; }
  await sb.auth.signOut();
  window.location.href='login-student.html?reset=1';
});
</script>
</body>
</html>
