<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reports — Admin · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script>
let period='daily';
let yearPick = String(new Date().getFullYear());
let monthPick = new Date().toISOString().slice(0,7); // YYYY-MM
let yearFrom = String(new Date().getFullYear());
let yearTo = String(new Date().getFullYear());
function daysBack(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function inRange(d){
  const t=todayStr();
  if(period==='daily') return d===t;
  if(period==='weekly') return d>=daysBack(6);
  if(period==='monthly') return d.startsWith(monthPick);
  if(period==='yearly'){ const y=d.slice(0,4); const lo=yearFrom<=yearTo?yearFrom:yearTo; const hi=yearFrom<=yearTo?yearTo:yearFrom; return y>=lo && y<=hi; }
  return true;
}
function availableYears(){
  const db=getDB();
  const ys=new Set(db.attendance.map(a=>a.date.slice(0,4)));
  ys.add(String(new Date().getFullYear()));
  return Array.from(ys).sort((a,b)=>b.localeCompare(a));
}
async function render(){
  await requireAdmin(); const db=getDB();
  const recs=db.attendance.filter(a=>inRange(a.date)).map(a=>({...a,student:db.students.find(s=>s.id===a.student_id)})).filter(a=>a.student).sort((a,b)=>b.date.localeCompare(a.date));
  const totalHrs=+recs.reduce((s,a)=>s+(a.hours||0),0).toFixed(2);
  const present=recs.filter(a=>a.status==='present').length;
  const late=recs.filter(a=>a.status==='late').length;
  const years=availableYears();

  document.getElementById('shell').innerHTML = renderSidebar('admin','reports') + `
    <main class="main">
      ${renderTopbar('Reports','Generate and export daily, weekly, monthly, or yearly reports.')}
      <div class="card">
        <div class="card-head"><div class="card-title">Report Period</div>
          <div class="flex gap-2" style="flex-wrap:wrap;align-items:center">
            <button class="btn ${period==='daily'?'btn-primary':'btn-outline'} btn-sm" onclick="period='daily';render()">Daily</button>
            <button class="btn ${period==='weekly'?'btn-primary':'btn-outline'} btn-sm" onclick="period='weekly';render()">Weekly</button>
            <button class="btn ${period==='monthly'?'btn-primary':'btn-outline'} btn-sm" onclick="period='monthly';render()">Monthly</button>
            <button class="btn ${period==='yearly'?'btn-primary':'btn-outline'} btn-sm" onclick="period='yearly';render()">Yearly</button>
            ${period==='monthly'?`<input class="form-control" type="month" style="width:170px" value="${monthPick}" onchange="monthPick=this.value;render()">`:''}
            ${period==='yearly'?`<span class="text-sm text-muted">From</span><select class="form-control" style="width:100px" onchange="yearFrom=this.value;render()">${years.map(y=>`<option value="${y}" ${y===yearFrom?'selected':''}>${y}</option>`).join('')}</select>
            <span class="text-sm text-muted">To</span><select class="form-control" style="width:100px" onchange="yearTo=this.value;render()">${years.map(y=>`<option value="${y}" ${y===yearTo?'selected':''}>${y}</option>`).join('')}</select>`:''}
          </div>
        </div>
        <div class="stat-grid">
          <div class="stat-card"><div><div class="stat-label">Total Records</div><div class="stat-value">${recs.length}</div></div><div class="stat-icon"></div></div>
          <div class="stat-card green"><div><div class="stat-label">Present</div><div class="stat-value">${present}</div></div><div class="stat-icon"></div></div>
          <div class="stat-card yellow"><div><div class="stat-label">Late</div><div class="stat-value">${late}</div></div><div class="stat-icon">️</div></div>
          <div class="stat-card"><div><div class="stat-label">Hours Rendered</div><div class="stat-value">${totalHrs}</div></div><div class="stat-icon"></div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">${period[0].toUpperCase()+period.slice(1)} Report${rangeSuffix()}</div>
          <div class="flex gap-2">
            <button class="btn btn-outline btn-sm" onclick="csv()"> CSV</button>
            <button class="btn btn-primary btn-sm" onclick="pdf()"> PDF</button>
            <button class="btn btn-yellow btn-sm" onclick="prn()"> Print</button>
          </div></div>
        <div class="table-wrap"><table id="repTbl"><thead><tr><th>Date</th><th>Intern</th><th>Time In</th><th>Time Out</th><th>Hours</th><th>Status</th></tr></thead>
        <tbody>${recs.length?recs.map(a=>`<tr><td>${fmtDate(a.date)}</td><td>${a.student.name} <span class="text-muted">(${a.student.id})</span></td>
        <td>${fmt12(a.time_in)}</td><td>${fmt12(a.time_out)}</td><td>${a.hours||'—'}</td>
        <td><span class="pill ${a.status==='present'?'green':a.status==='late'?'yellow':'red'}">${a.status}</span></td></tr>`).join(''):'<tr><td colspan="6" class="text-center text-muted" style="padding:24px">No records in range.</td></tr>'}</tbody></table></div>
      </div>
    </main>`;
  startClock('#clockBox');
}
function curRecs(){const db=getDB();return db.attendance.filter(a=>inRange(a.date)).map(a=>({...a,student:db.students.find(s=>s.id===a.student_id)})).filter(a=>a.student);}
function rangeSuffix(){
  if(period==='monthly') return ' — '+monthPick;
  if(period==='yearly'){ const lo=yearFrom<=yearTo?yearFrom:yearTo; const hi=yearFrom<=yearTo?yearTo:yearFrom; return ' — '+(lo===hi?lo:lo+' to '+hi); }
  return '';
}
function periodLabel(){ if(period==='yearly'){const lo=yearFrom<=yearTo?yearFrom:yearTo;const hi=yearFrom<=yearTo?yearTo:yearFrom;return `yearly-${lo===hi?lo:lo+'-'+hi}`;} if(period==='monthly') return 'monthly-'+monthPick; return period;}
function csv(){ const rows=[['Date','Intern ID','Name','Time In','Time Out','Hours','Status']]; curRecs().forEach(a=>rows.push([fmtDate(a.date),a.student.id,a.student.name,fmt12(a.time_in),fmt12(a.time_out),a.hours||0,a.status])); exportCSV(periodLabel()+'-report.csv',rows);}
function pdf(){ const rows=curRecs().map(a=>[fmtDate(a.date),a.student.id,a.student.name,fmt12(a.time_in),fmt12(a.time_out),a.hours||'—',a.status]); exportPDF(periodLabel()+'-report.pdf',period[0].toUpperCase()+period.slice(1)+' Attendance Report'+rangeSuffix(),['Date','ID','Name','Time In','Time Out','Hrs','Status'],rows);}
function prn(){ printReport(period[0].toUpperCase()+period.slice(1)+' Attendance Report'+rangeSuffix(),document.getElementById('repTbl').outerHTML);}
render();
</script>
</body></html>
