<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Account — Admin · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
async function render(){
  const admin = await requireAdmin(); const db=getDB();
  document.getElementById('shell').innerHTML = renderSidebar('admin','account') + `
    <main class="main">
      ${renderTopbar('Account Settings','Change your password and manage administrators.')}
      <div class="card-grid-2">
        <div class="card">
          <div class="card-head"><div class="card-title">Change Password</div></div>
          <form onsubmit="chPass(event)">
            <div class="form-group"><label>Current Password</label><input class="form-control" type="password" id="old" required></div>
            <div class="form-row">
              <div class="form-group"><label>New Password</label><input class="form-control" type="password" id="n1" required></div>
              <div class="form-group"><label>Confirm</label><input class="form-control" type="password" id="n2" required></div>
            </div>
            <button class="btn btn-primary">Update Password</button>
          </form>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">Add Admin</div></div>
          <form onsubmit="addAdmin(event)">
            <div class="form-group"><label>Full Name</label><input class="form-control" id="an" required></div>
            <div class="form-row">
              <div class="form-group"><label>Username</label><input class="form-control" id="au" required></div>
              <div class="form-group"><label>Password</label><input class="form-control" id="ap" required></div>
            </div>
            <button class="btn btn-yellow">Add Administrator</button>
          </form>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">Administrators</div></div>
        <div class="table-wrap"><table><thead><tr><th>ID</th><th>Name</th><th>Username</th><th>Role</th><th style="text-align:right">Action</th></tr></thead>
        <tbody>${db.admins.map(a=>`<tr><td>${a.id}</td><td>${a.name}</td><td>@${a.username}</td><td><span class="pill blue">Admin</span></td>
        <td style="text-align:right">${a.id===admin.id?'<span class="text-muted text-sm">You</span>':`<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="delAdmin('${a.id}')"></button>`}</td></tr>`).join('')}</tbody></table></div>
      </div>
    </main>`;
  startClock('#clockBox');
}
function chPass(e){ e.preventDefault(); const db=getDB(); const a=db.admins.find(x=>x.id===db.session.id);
  if(a.password!==old.value){toast('Current password wrong','error');return;}
  if(n1.value!==n2.value){toast('Passwords do not match','error');return;}
  a.password=n1.value; saveDB(db); toast('Password changed','success'); render();}
function addAdmin(e){ e.preventDefault(); const db=getDB();
  const id='A'+String(db.admins.length+1).padStart(3,'0');
  if(db.admins.some(x=>x.username===au.value)){toast('Username exists','error');return;}
  db.admins.push({id,name:an.value,username:au.value,password:ap.value,role:'Admin',email:''}); saveDB(db); toast('Admin added','success'); render();}
function delAdmin(id){ if(!confirm('Delete admin '+id+'?')) return; const db=getDB(); db.admins=db.admins.filter(x=>x.id!==id); saveDB(db); render();}
render();
</script>
</body></html>
