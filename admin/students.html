<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Students — Admin · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
async function render(){
  const admin = await requireAdmin(); if(!admin) return;
  const students = window.__DB__.students.filter(s=>s.active);
  document.getElementById('shell').innerHTML = renderSidebar('admin','students') + `
    <main class="main">
      ${renderTopbar('Students', 'Manage active OJT interns. Newly registered accounts appear here automatically.')}
      <div class="card">
        <div class="card-title">Active Interns (${students.length})</div>
        <table class="table">
          <thead><tr><th>ID</th><th>Name</th><th>School</th><th>Course</th><th>Period</th><th>Required Hrs</th><th>Documents</th><th></th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>

    <!-- Edit modal: ONLY start_date, end_date, required_hours per requirements -->
    <div class="modal" id="editModal">
      <div class="modal-inner" style="max-width:460px">
        <div class="modal-head">
          <h3>Edit Student Schedule</h3>
          <button class="close-x" onclick="closeModal('editModal')">×</button>
        </div>
        <div class="modal-body">
          <p class="text-muted text-sm">Only OJT schedule and required hours can be edited here. Other personal details are shown in the student's profile view.</p>
          <input type="hidden" id="e_id">
          <div id="e_name" style="font-weight:700;color:var(--blue-900);margin-bottom:12px"></div>
          <div class="form-group"><label>Start Date</label><input type="date" class="form-control" id="e_start"></div>
          <div class="form-group"><label>End Date</label><input type="date" class="form-control" id="e_end"></div>
          <div class="form-group"><label>Required Hours</label><input type="number" class="form-control" id="e_hours" min="1"></div>
          <div class="form-error" id="e_err"></div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
          <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
      </div>
    </div>

    <!-- Documents modal: admin views files uploaded by a student -->
    <div class="modal" id="docsModal">
      <div class="modal-inner" style="max-width:720px">
        <div class="modal-head">
          <h3 id="d_title">Uploaded Documents</h3>
          <button class="close-x" onclick="closeModal('docsModal')">×</button>
        </div>
        <div class="modal-body">
          <div id="d_body">Loading…</div>
        </div>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="closeModal('docsModal')">Close</button>
        </div>
      </div>
    </div>`;
  startClock('#clockBox');
  drawRows();
}
function drawRows(){
  const rows = document.getElementById('rows');
  const list = window.__DB__.students.filter(s=>s.active);
  rows.innerHTML = list.map(s=>{
    const n = (s.requirements||[]).length;
    return `
    <tr>
      <td style="font-weight:700;color:var(--blue-800)">${s.id}</td>
      <td>${s.name}</td>
      <td>${s.school||'—'}</td>
      <td>${s.course||'—'}</td>
      <td>${fmtDate(s.start_date)} – ${fmtDate(s.end_date)}</td>
      <td>${s.required_hours}</td>
      <td><button class="btn btn-outline btn-sm" onclick="viewDocs('${s.id}')">View (${n})</button></td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openEdit('${s.id}')">Edit</button>
        <button class="btn btn-outline btn-sm" style="color:#c53030;border-color:#c53030" onclick="archive('${s.id}')">Archive</button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:#888">No active students yet. Newly registered accounts will appear here automatically.</td></tr>';
}
function openEdit(id){
  const s = window.__DB__.students.find(x=>x.id===id); if(!s) return;
  document.getElementById('e_id').value = s.id;
  document.getElementById('e_name').textContent = `${s.name} · ${s.id}`;
  document.getElementById('e_start').value = s.start_date;
  document.getElementById('e_end').value = s.end_date;
  document.getElementById('e_hours').value = s.required_hours;
  openModal('editModal');
}
async function saveEdit(){
  const id = document.getElementById('e_id').value;
  const patch = {
    start_date: document.getElementById('e_start').value,
    end_date: document.getElementById('e_end').value,
    required_hours: +document.getElementById('e_hours').value,
  };
  const r = await updateStudent(id, patch);
  if(!r.ok){ document.getElementById('e_err').textContent = r.error; return; }
  closeModal('editModal'); toast('Student updated.','success'); drawRows();
}
async function archive(id){
  if(!confirm('Archive this student? They will lose access until reactivated.')) return;
  await updateStudent(id, { active:false });
  toast('Archived.','success'); drawRows();
}

// Admin: view documents uploaded by a specific intern
function viewDocs(id){
  const s = window.__DB__.students.find(x=>x.id===id); if(!s) return;
  document.getElementById('d_title').textContent = `Documents — ${s.name} (${s.id})`;
  const reqs = s.requirements || [];
  document.getElementById('d_body').innerHTML = reqs.length === 0
    ? '<p class="text-muted">This intern has not uploaded any documents yet.</p>'
    : '<table class="table"><thead><tr><th>File</th><th>Label</th><th>Size</th><th>Uploaded</th><th></th></tr></thead><tbody>'
      + reqs.map(r=>`<tr>
          <td>${r.name}</td>
          <td>${r.label||'—'}</td>
          <td>${humanSize(r.size)}</td>
          <td>${fmtDate(r.uploaded_at)}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="adminOpenFile('${r.path}')">View</button>
            <button class="btn btn-outline btn-sm" onclick="adminDownloadFile('${r.path}','${r.name.replace(/'/g,"\\'")}')">Download</button>
          </td>
        </tr>`).join('')
      + '</tbody></table>';
  openModal('docsModal');
}
async function adminOpenFile(path){
  const url = await getRequirementUrl(path);
  if(url) window.open(url,'_blank'); else toast('Cannot open file.','error');
}
async function adminDownloadFile(path, filename){
  const url = await getRequirementUrl(path);
  if(!url){ toast('Cannot download file.','error'); return; }
  const a = document.createElement('a');
  a.href = url; a.download = filename || 'document'; a.target = '_blank';
  document.body.appendChild(a); a.click(); a.remove();
}
render();
</script>
</body>
</html>
