<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Announcements — Admin · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
async function render(){
  await requireAdmin(); const db=getDB();
  const anns=db.announcements.slice().sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('shell').innerHTML = renderSidebar('admin','announcements') + `
    <main class="main">
      ${renderTopbar('Announcements','Post announcements and reminders for OJT interns.')}
      <div class="card-grid-2">
        <div class="card">
          <div class="card-head"><div class="card-title"> New Announcement</div></div>
          <form onsubmit="post(event)">
            <div class="form-group"><label>Title</label><input class="form-control" id="t" required></div>
            <div class="form-group"><label>Message</label><textarea class="form-control" id="b" rows="5" required></textarea></div>
            <button class="btn btn-primary">Post Announcement</button>
          </form>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">Posted (${anns.length})</div></div>
          ${anns.map(a=>`<div style="padding:14px;border-left:3px solid var(--yellow);background:var(--blue-50);margin-bottom:10px;border-radius:6px;position:relative">
          <button class="close-btn" style="position:absolute;top:6px;right:6px" onclick="del('${a.id}')"></button>
          <div style="font-weight:700;color:var(--blue-900)">${a.title}</div>
          <div class="text-sm text-muted">${fmtDate(a.date)} · ${a.author}</div>
          <div class="text-sm mt-2">${a.body}</div></div>`).join('') || '<div class="text-muted">No announcements yet.</div>'}
        </div>
      </div>
    </main>`;
  startClock('#clockBox');
}
function post(e){ e.preventDefault(); const db=getDB();
  db.announcements.push({id:'AN'+Math.random().toString(36).slice(2,8),title:t.value,body:b.value,date:todayStr(),author:'Admin'});
  saveDB(db); toast('Announcement posted','success'); render();}
function del(id){ if(!confirm('Delete?')) return; const db=getDB(); db.announcements=db.announcements.filter(x=>x.id!==id); saveDB(db); render();}
render();
</script>
</body></html>
