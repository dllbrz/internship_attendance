<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Attendance — Admin · Naic OJT</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell" id="shell"><div style="padding:40px;text-align:center">Loading…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
let CURRENT_TAB = 'all';
let SEARCH = '';
let CURRENT_DATE = todayStr();
let REFRESH_TIMER = null;

async function render(){
  const admin = await requireAdmin(); if(!admin) return;
  document.getElementById('shell').innerHTML = renderSidebar('admin','attendance') + `
    <main class="main">
      ${renderTopbar('Attendance', "Today's live attendance. Students are auto-marked Absent if not scanned in within 1 hour of their expected time.",
        `<button class="btn btn-outline" onclick="refreshData()">Refresh</button>
         <button class="btn btn-outline" style="color:#c53030;border-color:#c53030" onclick="deleteAllToday()">Delete All (Today)</button>`)}

      <div class="card">
        <div class="filter-row" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
          <input type="date" class="form-control" id="dateFilter" value="${CURRENT_DATE}" style="max-width:180px" onchange="changeDate(this.value)">
          <input type="text" class="form-control" id="search" placeholder="Search name or ID…" style="flex:1;min-width:200px" oninput="onSearch(this.value)">
        </div>

        <div class="status-tabs">
          <button class="status-tab active" data-tab="all"    onclick="switchTab('all')">All <span class="count" id="cnt-all">0</span></button>
          <button class="status-tab"        data-tab="present" onclick="switchTab('present')">Present <span class="count" id="cnt-present">0</span></button>
          <button class="status-tab"        data-tab="late"    onclick="switchTab('late')">Late <span class="count" id="cnt-late">0</span></button>
          <button class="status-tab"        data-tab="absent"  onclick="switchTab('absent')">Absent <span class="count" id="cnt-absent">0</span></button>
        </div>

        <table class="table">
          <thead><tr>
            <th>Intern ID</th><th>Name</th>
            <th>Time In</th><th>Time Out</th>
            <th>Status</th><th>Hours</th>
          </tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>`;
  startClock('#clockBox');
  drawRows();
  // live update every 30s (Time In/Out, Status, Hours only)
  if(REFRESH_TIMER) clearInterval(REFRESH_TIMER);
  REFRESH_TIMER = setInterval(refreshData, 30000);
}

function changeDate(d){ CURRENT_DATE = d; drawRows(); }
function onSearch(v){ SEARCH = v.toLowerCase(); drawRows(); }
function switchTab(tab){
  CURRENT_TAB = tab;
  document.querySelectorAll('.status-tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  drawRows();
}

function computeRows(){
  // Every ACTIVE registered student appears; join with today's attendance record.
  const students = window.__DB__.students.filter(s=>s.active);
  return students.map(s=>{
    const rec = window.__DB__.attendance.find(a=>a.student_id===s.id && a.date===CURRENT_DATE);
    return {
      id: s.id, name: s.name,
      time_in: rec?.time_in || null,
      time_out: rec?.time_out || null,
      status: rec?.status || 'absent',
      hours: rec?.hours || 0
    };
  });
}

function drawRows(){
  const all = computeRows().filter(r=>
    !SEARCH || r.id.toLowerCase().includes(SEARCH) || r.name.toLowerCase().includes(SEARCH)
  );
  const counts = { all: all.length, present:0, late:0, absent:0 };
  all.forEach(r=>counts[r.status]++);
  document.getElementById('cnt-all').textContent = counts.all;
  document.getElementById('cnt-present').textContent = counts.present;
  document.getElementById('cnt-late').textContent = counts.late;
  document.getElementById('cnt-absent').textContent = counts.absent;

  const filtered = CURRENT_TAB==='all' ? all : all.filter(r=>r.status===CURRENT_TAB);
  const rows = document.getElementById('rows');
  rows.innerHTML = filtered.map(r=>`
    <tr>
      <td style="font-weight:700;color:var(--blue-800)">${r.id}</td>
      <td>${r.name}</td>
      <td>${fmt12(r.time_in)}</td>
      <td>${fmt12(r.time_out)}</td>
      <td><span class="badge badge-${r.status}">${r.status.charAt(0).toUpperCase()+r.status.slice(1)}</span></td>
      <td>${r.hours.toFixed(2)}</td>
    </tr>`).join('') || `<tr><td colspan="6" style="text-align:center;color:#888;padding:20px">No ${CURRENT_TAB==='all'?'':CURRENT_TAB+' '}records for ${fmtDate(CURRENT_DATE)}.</td></tr>`;
}

async function refreshData(){
  // Live-update Time In/Out, Status, Hours by refetching attendance for the selected date
  const { data } = await sb.from('attendance').select('*').eq('date', CURRENT_DATE);
  const internIdMap = new Map(window.__DB__.students.map(s=>[s.auth_id, s.id]));
  // Remove old attendance for that date, insert fresh
  window.__DB__.attendance = window.__DB__.attendance.filter(a=>a.date!==CURRENT_DATE);
  (data||[]).forEach(a=>{
    window.__DB__.attendance.push({
      id:a.id, student_id: internIdMap.get(a.student_id)||a.student_id, _auth_id:a.student_id,
      date:a.date, time_in:a.time_in?.slice(0,5)||null, time_out:a.time_out?.slice(0,5)||null,
      hours: Number(a.hours||0), status:a.status, verified:a.verified
    });
  });
  await autoMarkAbsent();
  drawRows();
}

async function deleteAllToday(){
  if(!confirm(`Delete ALL attendance records for ${fmtDate(CURRENT_DATE)}? This cannot be undone.`)) return;
  const r = await deleteAllAttendanceForDate(CURRENT_DATE);
  if(!r.ok){ toast(r.error,'error'); return; }
  toast('All attendance records for today deleted.','success');
  drawRows();
}

render();
</script>
</body>
</html>
